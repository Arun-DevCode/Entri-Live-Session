<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio | Eva Dev</title>

    <!---External Style File-->
    <!-- <link rel="stylesheet" href="style.css" /> -->

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* Header Section*/
      .Header-container {
        padding: 1rem;
        background-color: black;
        color: white;
      }

      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 80%;
        margin: 0 auto;
      }

      ul {
        display: flex;
        list-style-type: none;
        column-gap: 1rem;
      }

      a {
        text-decoration: none;
        color: white;
      }
      .nav-menu {
        display: flex;
        align-items: center;
        column-gap: 3.5rem;
      }
      .Hire-Btn {
        padding-inline: 1.5rem;
        padding-block: 0.5rem;
        font-size: 1rem;
        font-weight: bold;
        background-color: white;
        border-radius: 0.25rem;
      }

      .Hire-Btn:hover {
        border: 1px solid white;
        background-color: black;
        color: white;
      }

      /*--Main Content---*/
      .Hero-Section {
        display: flex;
        height: 100vh;
        align-items: center;
        gap: 2rem;
        padding: 2.5rem;
      }

      /*Left Side*/
      .primary-content {
        max-width: 720px;
        margin: 0 auto;
        /* flex: 1; */
      }

      span {
        background-color: black;
        color: white;
        border-radius: 2.5rem;
        padding-inline: 2.5rem;
        padding-block: 0.5rem;
        font-size: 1rem;
      }
      h1 {
        font-size: 4.5rem;
        margin-block: 1.5rem;
      }

      p {
        font-size: 1.5rem;
        margin-block: 1.5rem;
        color: gray;
      }

      .Resume-Btn {
        padding: 12.5px 30px;
        border: 0;
        border-radius: 100px;
        background-color: #2ba8fb;
        color: #ffffff;
        font-weight: Bold;
        transition: all 0.5s;
        -webkit-transition: all 0.5s;
      }

      .Resume-Btn:hover {
        background-color: #6fc5ff;
        box-shadow: 0 0 20px #6fc5ff50;
        transform: scale(1.1);
      }
      .Resume:active {
        background-color: #3d94cf;
        transition: all 0.25s;
        -webkit-transition: all 0.25s;
        box-shadow: none;
        transform: scale(0.98);
      }

      button {
        padding-inline: 1.5rem;
        padding-block: 0.5rem;
        font-size: 1rem;
        font-weight: bold;
        background: none;
        border: none;
      }

      /*---- Right Side Content*/
      .Image-Container {
        padding: 2.5rem;
        border: 1px solid;
        /* flex: 1; */
        margin-right: 8rem;
      }

      img {
        width: 32rem;
      }

      @media (442px > width) {
        .Hero-Section {
          flex-direction: column;
          row-gap: 4rem;
        }
      }
    </style>
  </head>
  <body>
    <!--Header-->
    <header class="Header-container">
      <!---Navbar--->
      <nav class="nav-container">
        <h2>Eva.Dev</h2>
        <div class="nav-menu">
          <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">Support</a></li>
          </ul>
          <!--CTA-->
          <button class="Hire-Btn">Hire Me</button>
        </div>
      </nav>
    </header>

    <!---Main Content-->
    <main>
      <!---Hero Section-->
      <section class="Hero-Section">
        <!--Left Side Content-->
        <div class="primary-content">
          <span>Hey, There👋🏻</span>
          <h1>Eva Helen</h1>
          <p>
            Lorem ipsum dolor sit amet, consectetur adipisicing elit. Aliquam
            commodi ut eveniet nam sit, aspernatur cumque nesciunt in nisi velit
            libero reprehenderit qui et voluptates molestiae temporibus culpa.
            Blanditiis, asperiores?
          </p>

          <!--Button Group-->
          <div>
            <button class="Resume-Btn">Download Resume</button>
            <button>View Project</button>
          </div>
        </div>
        <!--Right Side Content-->
        <div class="Image-Container">
          <img
            src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=764&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt="Avatar"
          />
        </div>
      </section>
    </main>
  </body>
</html>
